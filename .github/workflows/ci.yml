name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Build Backend
      run: docker build ./backend/app -t backend-test

    - name: Build Frontend
      run: docker build ./frontend/coldchain-ui -t frontend-test

    - name: Run Containers Test
      run: |
        docker compose up -d
        sleep 10
        docker ps

    - name: Stop Containers
      run: docker compose down
